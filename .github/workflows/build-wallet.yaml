name: Build Wallet (Windows Only)

on:
  push:
    branches:
      - 4.0.0.0-win
  pull_request:
    branches:
      - 4.0.0.0-win

jobs:
  build-windows:
    runs-on: ubuntu-latest
    name: Cross-Compile for Windows x64
    steps:
      - uses: actions/checkout@v3

      - name: Install cross-compilation dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64 zip \
              curl build-essential libtool autotools-dev automake pkg-config bsdmainutils cmake

      - name: Build depends for Windows
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Configure for Windows
        run: |
          ./autogen.sh
          ./configure --prefix=$(pwd)/depends/x86_64-w64-mingw32 \
                      --host=x86_64-w64-mingw32 \
                      --disable-tests --disable-bench --with-gui=qt5

      - name: Build Wallet
        run: make -j$(nproc)

      - name: Package Windows binaries
        run: |
          mkdir -p windows
          cp src/bitoreum-cli.exe src/bitoreumd.exe src/qt/bitoreum-qt.exe windows || true
          zip -r windows-wallet.zip windows

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-wallet
          path: windows-wallet.zip
