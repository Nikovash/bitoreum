name: Build Wallet

on:
  push:
    branches:
      - 4.0.0.0-win
  pull_request:
    branches:
      - 4.0.0.0-win

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os_version: [22.04, 24.04]
    name: Build for Ubuntu ${{ matrix.os_version }}
    steps:
      - uses: actions/checkout@v3

      - name: Adjust sources list (if needed)
        run: sudo sed -i "s/focal/${{ matrix.os_version }}/g" /etc/apt/sources.list || true

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl build-essential libtool autotools-dev automake \
              pkg-config python3 bsdmainutils cmake libdb-dev libdb++-dev screen zlib1g-dev

      - name: Build depends
        run: |
          cd depends
          make -j$(nproc)

      - name: Configure
        run: |
          ./autogen.sh
          ./configure --prefix=$(pwd)/depends/linux --disable-tests --disable-bench

      - name: Build Wallet
        run: make -j$(nproc)

      - name: Package Linux binaries
        run: |
          mkdir -p linux-${{ matrix.os_version }}
          cp src/bitoreum-cli src/bitoreumd src/qt/bitoreum-qt linux-${{ matrix.os_version }} || true
          tar -czvf linux-${{ matrix.os_version }}.tar.gz linux-${{ matrix.os_version }}

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v3
        with:
          name: linux-${{ matrix.os_version }}
          path: linux-${{ matrix.os_version }}.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    name: Cross-Compile for Windows x64
    steps:
      - uses: actions/checkout@v3

      - name: Install cross-compilation dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64 zip \
              curl build-essential libtool autotools-dev automake pkg-config bsdmainutils cmake

      - name: Build depends for Windows
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Configure for Windows
        run: |
          ./autogen.sh
          ./configure --prefix=$(pwd)/depends/x86_64-w64-mingw32 \
                      --host=x86_64-w64-mingw32 \
                      --disable-tests --disable-bench --with-gui=qt5

      - name: Build Wallet
        run: make -j$(nproc)

      - name: Package Windows binaries
        run: |
          mkdir -p windows
          cp src/bitoreum-cli.exe src/bitoreumd.exe src/qt/bitoreum-qt.exe windows || true
          zip -r windows-wallet.zip windows

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-wallet
          path: windows-wallet.zip
